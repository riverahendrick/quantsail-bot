name: quantsail

services:
  # ── Data Stores ──────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantsail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-quantsail}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantsail}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ─────────────────────────────────
  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantsail}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-quantsail}
      REDIS_URL: redis://redis:6379/0
      MASTER_KEY: ${MASTER_KEY}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase_key
    secrets:
      - firebase_key

  engine:
    build:
      context: ../../services/engine
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantsail}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-quantsail}
      REDIS_URL: redis://redis:6379/0
      MASTER_KEY: ${MASTER_KEY}

  # ── Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

  # ── SSL Certificate (manual run) ────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

secrets:
  firebase_key:
    file: ${GOOGLE_APPLICATION_CREDENTIALS:-./firebase_key.json}

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certbot_www:
